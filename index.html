<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List Web App</title>

  <!-- ✅ Favicon -->
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2921/2921222.png">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #003d5c, #04527b);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #222;
      background: #fff;
      width: 100%;
      text-align: center;
      padding: 10px 0;
      font-size: 20px;
      font-weight: 500;
      border-bottom: 1px solid #ccc;
    }

    .container {
      display: flex;
      gap: 40px;
      margin-top: 40px;
      align-items: flex-start;
    }

    /* Left Form Box */
    .form-box {
      background: #fff;
      border-radius: 6px;
      width: 300px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
      padding: 15px 20px;
    }

    .form-box input, 
    .form-box textarea {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .form-box textarea {
      height: 80px;
      resize: none;
    }

    .form-box button {
      width: 100%;
      background: #28a745;
      border: none;
      color: white;
      font-size: 16px;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.3s;
    }

    .form-box button:hover {
      background: #218838;
    }

    /* Right Table Section */
    table {
      width: 450px;
      border-collapse: collapse;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      font-size: 15px;
    }

    th {
      background: #fff;
      font-weight: bold;
      color: #222;
    }

    td button {
      background: #dc3545;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    td button:hover {
      background: #c82333;
    }

    @media (max-width: 850px) {
      .container {
        flex-direction: column;
        align-items: center;
      }
      table {
        width: 100%;
        max-width: 500px;
      }
    }
  </style>
</head>
<body>

  <h1>To-Do List Web App</h1>

  <div class="container">
    <!-- Left Form -->
    <div class="form-box">
      <form id="taskForm">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required placeholder="Enter Title">

        <label for="desc">Description</label>
        <textarea id="desc" name="desc" required placeholder="Enter Description"></textarea>

        <button type="submit">Save</button>
      </form>
    </div>

    <!-- Right Table -->
    <table id="taskTable">
      <thead>
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody>
        <!-- Dynamic Tasks Appear Here -->
      </tbody>
    </table>
  </div>

  <script>
    const form = document.getElementById("taskForm");
    const tableBody = document.querySelector("#taskTable tbody");

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      const title = document.getElementById("title").value.trim();
      const desc = document.getElementById("desc").value.trim();

      if (!title || !desc) {
        alert("Please fill out all fields!");
        return;
      }

      const row = document.createElement("tr");

      const titleCell = document.createElement("td");
      titleCell.textContent = title;

      const descCell = document.createElement("td");
      descCell.textContent = desc;

      const delCell = document.createElement("td");
      const delBtn = document.createElement("button");
      delBtn.textContent = "x";
      delBtn.onclick = () => row.remove();
      delCell.appendChild(delBtn);

      row.appendChild(titleCell);
      row.appendChild(descCell);
      row.appendChild(delCell);

      tableBody.appendChild(row);

      form.reset();
    });
  </script>

</body>
</html>
